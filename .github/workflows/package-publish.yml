name: ManifoldGuard package build and publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      target:
        description: Package index target
        required: true
        default: testpypi
        type: choice
        options:
          - testpypi
          - pypi
      publish:
        description: Publish package artifact
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build distribution artifacts
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m build
          python -m twine check dist/*

      - name: Smoke install built wheel
        run: |
          python -m venv .venv-install-smoke
          . .venv-install-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          python scripts/install_smoke.py

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v7
        with:
          name: manifoldguard-dist
          path: dist/*
          if-no-files-found: error

  publish-testpypi:
    if: github.event_name == 'workflow_dispatch' && inputs.publish == true && inputs.target == 'testpypi'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: testpypi
      url: https://test.pypi.org/p/manifold-guard

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v8
        with:
          name: manifoldguard-dist
          path: dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    if: github.event_name == 'workflow_dispatch' && inputs.publish == true && inputs.target == 'pypi'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/manifold-guard

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v8
        with:
          name: manifoldguard-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

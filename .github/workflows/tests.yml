name: MBT-5 offline regression tests

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      run_installability:
        description: Run installability matrix
        required: false
        default: true
        type: boolean
      run_preflight:
        description: Run preflight matrix
        required: false
        default: true
        type: boolean
      run_tests:
        description: Run test matrix
        required: false
        default: true
        type: boolean

jobs:
  installability:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_installability == true }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mode: [core, embeddings]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Summarize execution scope
        run: |
          echo "MBT-5 CI scope (installability job)"
          echo "event=${{ github.event_name }}"
          echo "mode=${{ matrix.mode }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run_installability=${{ inputs.run_installability }}"
            echo "run_preflight=${{ inputs.run_preflight }}"
            echo "run_tests=${{ inputs.run_tests }}"
          else
            echo "run_installability=true (default)"
            echo "run_preflight=true (default)"
            echo "run_tests=true (default)"
          fi

      - name: Install package variant
        run: |
          python -m pip install --upgrade pip
          if [ "${{ matrix.mode }}" = "core" ]; then
            python -m pip install -e . --no-deps
            python -m pip install numpy scipy
          else
            python -m pip install -e .[embeddings]
          fi

      - name: Verify package is installable and public entrypoints are available
        run: |
          python -c "import mbt_ai_tools; from mbt_ai_tools.cli import main"
          python -c "from mbt_ai_tools import extract_relations, evaluate_candidate, regulate_candidates, token_shock_map"
          python -c "from importlib.metadata import version; print(version('mbt-ai-tools'))"
          python -c "import mbt_ai_tools; print(mbt_ai_tools.__version__)"

      - name: Verify embedding extra is available
        if: matrix.mode == 'embeddings'
        run: python -c "import importlib.util; assert importlib.util.find_spec('sentence_transformers') is not None"

  preflight:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_preflight == true }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        mode: [core, embeddings]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Summarize execution scope
        run: |
          echo "MBT-5 CI scope (preflight job)"
          echo "event=${{ github.event_name }}"
          echo "mode=${{ matrix.mode }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run_installability=${{ inputs.run_installability }}"
            echo "run_preflight=${{ inputs.run_preflight }}"
            echo "run_tests=${{ inputs.run_tests }}"
          else
            echo "run_installability=true (default)"
            echo "run_preflight=true (default)"
            echo "run_tests=true (default)"
          fi

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest jsonschema

      - name: Install package variant
        run: |
          if [ "${{ matrix.mode }}" = "core" ]; then
            python -m pip install -e . --no-deps
            python -m pip install numpy scipy
          else
            python -m pip install -e .[embeddings]
          fi

      - name: Run preflight (docs + tests for core)
        if: matrix.mode == 'core'
        run: python scripts/preflight.py

      - name: Generate release evidence artifact
        if: matrix.mode == 'core'
        run: python scripts/release_check.py --output release-evidence.json --max-output-chars 1000

      - name: Generate regulator evaluation artifact
        if: matrix.mode == 'core'
        run: python scripts/evaluate_regulator.py --output regulator-evaluation.json

      - name: Upload release evidence artifact
        if: matrix.mode == 'core'
        uses: actions/upload-artifact@v7
        with:
          name: mbt-release-evidence
          path: |
            release-evidence.json
            regulator-evaluation.json
          if-no-files-found: error

      - name: Run docs-only preflight for embeddings variant
        if: matrix.mode == 'embeddings'
        run: python scripts/preflight.py --docs-only
  test:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_tests == true }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mode: [core, embeddings]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Summarize execution scope
        run: |
          echo "MBT-5 CI scope (test job)"
          echo "event=${{ github.event_name }}"
          echo "mode=${{ matrix.mode }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run_installability=${{ inputs.run_installability }}"
            echo "run_preflight=${{ inputs.run_preflight }}"
            echo "run_tests=${{ inputs.run_tests }}"
          else
            echo "run_installability=true (default)"
            echo "run_preflight=true (default)"
            echo "run_tests=true (default)"
          fi

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest numpy scipy
          if [ "${{ matrix.mode }}" = "core" ]; then
            python -m pip install -e . --no-deps
          else
            python -m pip install -e .[embeddings]
          fi

      - name: Verify package is importable and public entrypoints are available
        run: |
          python -c "from mbt_ai_tools import extract_relations, evaluate_candidate, regulate_candidates, token_shock_map"
          python -c "from mbt_ai_tools.cli import main"
          python -c "from importlib.metadata import version; print(version('mbt-ai-tools'))"
          python -c "import mbt_ai_tools; print(mbt_ai_tools.__version__)"

      - name: Regenerate public corpus
        if: matrix.mode == 'core'
        run: python examples/build_regression_corpus.py

      - name: Run full suite
        if: matrix.mode == 'core'
        run: python -m pytest -q

      - name: Verify embedding extra is available
        if: matrix.mode == 'embeddings'
        run: python -c "import importlib.util; assert importlib.util.find_spec('sentence_transformers') is not None"

      - name: Run embedding-mode smoke tests
        if: matrix.mode == 'embeddings'
        run: python -m pytest -q tests/test_tokens.py tests/test_regulator.py

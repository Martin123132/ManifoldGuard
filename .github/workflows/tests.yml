name: MBT-5 offline regression tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mode: [core, embeddings]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest numpy scipy
          if [ "${{ matrix.mode }}" = "core" ]; then
            pip install -e . --no-deps
          else
            pip install -e .[embeddings]
          fi

      - name: Verify package is importable and public entrypoints are available
        run: |
          python -c "from mbt_ai_tools import extract_relations, evaluate_candidate, regulate_candidates, token_shock_map"
          python -c "from mbt_ai_tools.cli import main"

      - name: Regenerate public corpus
        run: python examples/build_regression_corpus.py

      - name: Run full suite
        if: matrix.mode == 'core'
        run: pytest -q

      - name: Verify embedding extra is available
        if: matrix.mode == 'embeddings'
        run: python -c "import importlib.util; assert importlib.util.find_spec('sentence_transformers') is not None"

      - name: Run embedding-mode smoke tests
        if: matrix.mode == 'embeddings'
        run: pytest -q tests/test_tokens.py tests/test_regulator.py

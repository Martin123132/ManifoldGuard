name: MBT-5 docs and manifest quality checks

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      run_core_mode:
        description: Run core mode docs-quality checks
        required: false
        default: true
        type: boolean
      run_embeddings_mode:
        description: Run embeddings mode docs-quality checks
        required: false
        default: true
        type: boolean
      run_schema_checks:
        description: Run schema validation steps
        required: false
        default: true
        type: boolean

jobs:
  docs-quality:
    if: ${{ github.event_name != 'workflow_dispatch' || (matrix.mode == 'core' && inputs.run_core_mode == true) || (matrix.mode == 'embeddings' && inputs.run_embeddings_mode == true) }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mode: [core, embeddings]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Summarize execution scope
        run: |
          echo "MBT-5 docs-quality scope"
          echo "event=${{ github.event_name }}"
          echo "mode=${{ matrix.mode }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run_core_mode=${{ inputs.run_core_mode }}"
            echo "run_embeddings_mode=${{ inputs.run_embeddings_mode }}"
            echo "run_schema_checks=${{ inputs.run_schema_checks }}"
          else
            echo "run_core_mode=true (default)"
            echo "run_embeddings_mode=true (default)"
            echo "run_schema_checks=true (default)"
          fi

      - name: Install package variant
        if: ${{ github.event_name != 'workflow_dispatch' || (matrix.mode == 'core' && inputs.run_core_mode == true) || (matrix.mode == 'embeddings' && inputs.run_embeddings_mode == true) }}
        run: |
          python -m pip install --upgrade pip
          if [ "${{ matrix.mode }}" = "core" ]; then
            python -m pip install -e . --no-deps
            python -m pip install numpy scipy
          else
            python -m pip install -e .[embeddings]
          fi

      - name: Verify package and entrypoints are importable
        if: ${{ github.event_name != 'workflow_dispatch' || (matrix.mode == 'core' && inputs.run_core_mode == true) || (matrix.mode == 'embeddings' && inputs.run_embeddings_mode == true) }}
        run: |
          python -c "import mbt_ai_tools; from mbt_ai_tools.cli import main"
          python -c "from mbt_ai_tools import extract_relations, evaluate_candidate, regulate_candidates, token_shock_map"

      - name: Verify embedding extra is available
        if: ${{ matrix.mode == 'embeddings' && (github.event_name != 'workflow_dispatch' || inputs.run_embeddings_mode == true) }}
        run: python -c "import importlib.util; assert importlib.util.find_spec('sentence_transformers') is not None"

      - name: Validate manifest and docs contracts
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_schema_checks == true }}
        run: python scripts/docs_quality.py --skip-schema

      - name: Install JSON schema validator
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_schema_checks == true }}
        run: python -m pip install jsonschema

      - name: Validate report fixtures against JSON schema
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_schema_checks == true }}
        run: python scripts/docs_quality.py
